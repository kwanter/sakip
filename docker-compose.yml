version: '3.9'

services:
  # PHP/Apache Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sakip-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      # Mount application code for development (comment out for production)
      - ./:/var/www/html
      # Persist storage
      - ./storage/app:/var/www/html/storage/app
      - ./storage/logs:/var/www/html/storage/logs
      # Custom PHP configuration
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - APP_NAME=${APP_NAME:-SAKIP}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost}
      - LOG_CHANNEL=${LOG_CHANNEL:-daily}
      - LOG_LEVEL=${LOG_LEVEL:-warning}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-sakip}
      - DB_USERNAME=${DB_USERNAME:?DB_USERNAME is required}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - BROADCAST_DRIVER=${BROADCAST_DRIVER:-log}
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - FILESYSTEM_DISK=${FILESYSTEM_DISK:-local}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
      - SESSION_DRIVER=${SESSION_DRIVER:-redis}
      - SESSION_LIFETIME=${SESSION_LIFETIME:-120}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST:-smtp.mailtrap.io}
      - MAIL_PORT=${MAIL_PORT:-2525}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@sakip.local}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-SAKIP}
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_PORT_SSL:-443}:443"
    networks:
      - sakip-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: sakip-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_DATABASE:-sakip}
      MYSQL_USER: ${DB_USERNAME:?DB_USERNAME is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      # Main data persistence (bind mount - stored in project directory)
      - ./docker/mysql/data:/var/lib/mysql
      # Custom MySQL configuration
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      # Backup directory (bind mount - accessible from host)
      - ./docker/mysql/backups:/backups
      # Initialization scripts (run on first start)
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    # Bind to localhost only for local dev; omit ports entirely for production
    ports:
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    networks:
      - sakip-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis Cache/Queue
  redis:
    image: redis:7-alpine
    container_name: sakip-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    # Bind to localhost only for local dev; omit ports entirely for production
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    networks:
      - sakip-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sakip-queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=90 --sleep=3 --max-jobs=1000
    volumes:
      - ./:/var/www/html
    environment:
      - APP_NAME=${APP_NAME:-SAKIP}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-sakip}
      - DB_USERNAME=${DB_USERNAME:?DB_USERNAME is required}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    networks:
      - sakip-network
    depends_on:
      - mysql
      - redis

  # Scheduler (Cron Jobs)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sakip-scheduler
    restart: unless-stopped
    command: >
      sh -c "
      while true; do
        php artisan schedule:run --verbose --no-interaction &
        sleep 60
      done
      "
    volumes:
      - ./:/var/www/html
    environment:
      - APP_NAME=${APP_NAME:-SAKIP}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-sakip}
      - DB_USERNAME=${DB_USERNAME:?DB_USERNAME is required}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    networks:
      - sakip-network
    depends_on:
      - mysql
      - redis

  # Nginx Reverse Proxy (Optional - for production)
  nginx:
    image: nginx:alpine
    container_name: sakip-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - sakip-network
    depends_on:
      - app
    profiles:
      - with-nginx

networks:
  sakip-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
