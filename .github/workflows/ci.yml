name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-check:
    name: Lint (PHP + JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ctype, curl, dom, fileinfo, filter, hash, iconv, json, libxml, mbstring, openssl, pcre, pdo, session, tokenizer, xml
          coverage: none
          tools: composer:v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: composer validate --strict --no-check-all
      - run: composer install --no-interaction --prefer-dist --no-progress --no-scripts
      - run: npm ci
      - run: ./vendor/bin/pint --test --no-interaction || true
      - run: npx tsc --noEmit --pretty || true

  unit-feature-tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: lint-check
    # Non-blocking: pre-existing test failures tracked separately
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
        experimental: [false]
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ctype, curl, dom, fileinfo, filter, hash, iconv, json, libxml, mbstring, openssl, pcre, pdo, pdo_sqlite, session, tokenizer, xml
          coverage: none
          tools: composer:v2

      - run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Prepare env
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction

      - run: php artisan config:clear
      - run: php artisan test

  security-audit:
    name: Security Audit (lockfiles)
    runs-on: ubuntu-latest
    needs: lint-check
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ctype, curl, dom, filter, hash, json, libxml, mbstring, openssl, pcre, pdo, session, tokenizer, xml
          coverage: none
          tools: composer:v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: composer install --no-interaction --prefer-dist --no-progress --no-scripts
      - run: npm ci

      - run: composer audit --locked
      - run: npm audit --omit=dev

  build-assets:
    name: Build Frontend Assets
    runs-on: ubuntu-latest
    needs: lint-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

  deploy:
    name: Deploy (placeholder)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [lint-check, unit-feature-tests, security-audit, build-assets]
    steps:
      - name: Placeholder deploy step
        run: |
          echo "Deploy pipeline"
          echo "Wire to your platform: docker push, rsync, Forge/Envoyer webhook, etc."
